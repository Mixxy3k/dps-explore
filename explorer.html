<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KRDO - Eksplorator Danych</title>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f1f5f9;
            --card: #fff;
            --border: #e2e8f0;
            --text: #1e293b;
            --muted: #64748b;
            --shadow: 0 1px 3px rgba(0, 0, 0, .1);
            --r: 12px
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            -webkit-text-size-adjust: 100%
        }

        header {
            background: linear-gradient(135deg, #1e40af, #3b82f6);
            color: #fff;
            padding: 14px 16px
        }

        header h1 {
            font-size: 20px;
            font-weight: 700
        }

        header p {
            font-size: 12px;
            opacity: .85;
            margin-top: 2px
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 10px
        }

        /* Stats */
        .stats {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 4px;
            margin-bottom: 10px;
            -webkit-overflow-scrolling: touch
        }

        .stats::-webkit-scrollbar {
            height: 2px
        }

        .sc {
            flex: 0 0 auto;
            min-width: 90px;
            background: var(--card);
            border-radius: 10px;
            padding: 8px 12px;
            box-shadow: var(--shadow)
        }

        .sc .n {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
            white-space: nowrap
        }

        .sc .l {
            font-size: 9px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .3px;
            white-space: nowrap
        }

        /* File loader */
        .fl {
            background: var(--card);
            border-radius: var(--r);
            padding: 40px 20px;
            text-align: center;
            box-shadow: var(--shadow);
            margin-bottom: 10px
        }

        .fl.hidden {
            display: none
        }

        .fl .ic {
            font-size: 48px;
            margin-bottom: 8px
        }

        .fl h2 {
            font-size: 18px;
            margin-bottom: 4px
        }

        .fl p {
            color: var(--muted);
            font-size: 13px;
            margin-bottom: 14px
        }

        .fl label {
            display: inline-block;
            background: var(--primary);
            color: #fff;
            padding: 12px 28px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600
        }

        .fl input[type=file] {
            display: none
        }

        /* Presets */
        .presets {
            display: none;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 8px
        }

        .presets.active {
            display: flex
        }

        .preset {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 12px;
            cursor: pointer;
            font-weight: 600;
            white-space: nowrap;
            transition: all .15s;
            color: var(--text)
        }

        .preset:hover,
        .preset.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary)
        }

        .preset .ico {
            margin-right: 4px
        }

        /* Controls */
        .controls {
            display: none;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 10px
        }

        .controls.active {
            display: flex
        }

        .cr {
            display: flex;
            gap: 8px;
            flex-wrap: wrap
        }

        .sb {
            flex: 1;
            min-width: 140px;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            -webkit-appearance: none
        }

        .sb:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, .15)
        }

        .fs {
            flex: 1;
            min-width: 120px;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 12px;
            background: #fff;
            -webkit-appearance: none;
            appearance: none;
            outline: none
        }

        .fs:focus {
            border-color: var(--primary)
        }

        .cy {
            display: flex;
            gap: 8px;
            align-items: center
        }

        .cy label {
            font-size: 12px;
            color: var(--muted);
            font-weight: 600;
            white-space: nowrap
        }

        .cy input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 14px;
            outline: none
        }

        .cy input:focus {
            border-color: var(--primary)
        }

        .ub {
            padding: 8px 14px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap
        }

        .cb {
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: #fff;
            cursor: pointer;
            font-size: 18px;
            color: var(--muted)
        }

        /* Results */
        .ri {
            display: none;
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 8px
        }

        .ri.active {
            display: block
        }

        .ri strong {
            color: var(--text)
        }

        /* Cards */
        .cl {
            display: none;
            flex-direction: column;
            gap: 8px
        }

        .cl.active {
            display: flex
        }

        .pc {
            background: var(--card);
            border-radius: var(--r);
            box-shadow: var(--shadow);
            padding: 12px 14px;
            border-left: 4px solid var(--primary);
            position: relative
        }

        .pc .nm {
            font-size: 17px;
            font-weight: 700;
            padding-right: 36px
        }

        .pc .fav-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            padding: 4px;
            opacity: .5;
            transition: opacity .15s
        }

        .pc .fav-btn:hover,
        .pc .fav-btn.saved {
            opacity: 1
        }

        .pc .fav-btn.saved {
            animation: pop .3s
        }

        @keyframes pop {
            0% {
                transform: scale(1)
            }

            50% {
                transform: scale(1.3)
            }

            100% {
                transform: scale(1)
            }
        }

        .pc .dist {
            display: inline-block;
            font-size: 12px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 20px;
            margin-top: 4px
        }

        .dn {
            background: #d1fae5;
            color: #065f46
        }

        .dm {
            background: #fef3c7;
            color: #92400e
        }

        .df {
            background: #fee2e2;
            color: #991b1b
        }

        .dq {
            background: #f1f5f9;
            color: var(--muted)
        }

        .pc .mt {
            margin-top: 6px;
            display: flex;
            flex-wrap: wrap;
            gap: 4px 10px;
            font-size: 12px;
            color: var(--muted)
        }

        .pc .tl {
            margin-top: 4px;
            font-size: 12px;
            line-height: 1.4
        }

        .bgs {
            margin-top: 6px;
            display: flex;
            gap: 4px;
            flex-wrap: wrap
        }

        .bg {
            font-size: 9px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 4px;
            text-transform: uppercase
        }

        .bgr {
            background: #fef3c7;
            color: #92400e
        }

        .bgd {
            background: #dbeafe;
            color: #1e40af
        }

        .tg {
            font-size: 9px;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 600
        }

        .tp {
            background: #d1fae5;
            color: #065f46
        }

        .tv {
            background: #ede9fe;
            color: #5b21b6
        }

        .tz {
            background: #e0e7ff;
            color: #3730a3
        }

        .ts {
            background: #fce7f3;
            color: #9d174d
        }

        /* Desktop table */
        @media(min-width:900px) {
            .cl.active {
                display: none
            }

            .tw.active {
                display: block
            }
        }

        .tw {
            display: none;
            background: var(--card);
            border-radius: var(--r);
            box-shadow: var(--shadow);
            overflow: hidden
        }

        .tsc {
            overflow-x: auto;
            max-height: 70vh;
            overflow-y: auto
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px
        }

        thead {
            position: sticky;
            top: 0;
            z-index: 10
        }

        th {
            background: #f8fafc;
            text-align: left;
            padding: 10px 12px;
            font-weight: 600;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: .5px;
            color: var(--muted);
            border-bottom: 2px solid var(--border);
            cursor: pointer;
            user-select: none;
            white-space: nowrap
        }

        th:hover {
            color: var(--primary)
        }

        th .sa {
            margin-left: 4px;
            opacity: .4
        }

        th.sorted .sa {
            opacity: 1;
            color: var(--primary)
        }

        td {
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
            vertical-align: top
        }

        tr:hover td {
            background: #f8fafc
        }

        .cn {
            text-align: center;
            font-weight: 600;
            white-space: nowrap
        }

        td .fav-btn-cell {
            background: none;
            border: none;
            font-size: 16px;
            cursor: pointer;
            opacity: .5
        }

        td .fav-btn-cell:hover,
        td .fav-btn-cell.saved {
            opacity: 1
        }

        /* Pagination */
        .pg {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px;
            border-top: 1px solid var(--border)
        }

        .pg.active {
            display: flex
        }

        .pb {
            padding: 8px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: #fff;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600
        }

        .pb:disabled {
            opacity: .4;
            cursor: default
        }

        .pi {
            color: var(--muted);
            font-size: 12px
        }

        /* Basket panel */
        .bp {
            display: none;
            position: fixed;
            top: 0;
            right: 0;
            width: 380px;
            max-width: 90vw;
            height: 100vh;
            background: var(--card);
            box-shadow: -4px 0 20px rgba(0, 0, 0, .15);
            z-index: 100;
            flex-direction: column;
            transition: transform .25s
        }

        .bp.active {
            display: flex
        }

        .bp.closed {
            transform: translateX(100%)
        }

        .bph {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center
        }

        .bph h3 {
            font-size: 16px
        }

        .bph button {
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            padding: 4px
        }

        .bpl {
            flex: 1;
            overflow-y: auto;
            padding: 10px
        }

        .bpl .empty {
            text-align: center;
            padding: 40px 20px;
            color: var(--muted);
            font-size: 13px
        }

        .bitem {
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 8px
        }

        .bitem .bn {
            font-weight: 700;
            font-size: 13px
        }

        .bitem .bm {
            font-size: 11px;
            color: var(--muted);
            margin-top: 2px
        }

        .bitem .brm {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 13px;
            margin-top: 4px;
            padding: 2px 0
        }

        /* Basket toggle */
        .bt {
            display: none;
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--primary);
            color: #fff;
            border: none;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(37, 99, 235, .4);
            z-index: 99;
            transition: transform .15s
        }

        .bt.active {
            display: flex;
            align-items: center;
            justify-content: center
        }

        .bt:active {
            transform: scale(.9)
        }

        .bt .bc {
            position: absolute;
            top: -4px;
            right: -4px;
            background: #ef4444;
            color: #fff;
            font-size: 10px;
            font-weight: 700;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center
        }

        /* Overlay */
        .ov {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, .3);
            z-index: 99
        }

        .ov.active {
            display: block
        }

        /* Loading */
        .lo {
            display: none;
            text-align: center;
            padding: 40px;
            color: var(--muted)
        }

        .lo.active {
            display: block
        }

        .sp {
            width: 32px;
            height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin .8s linear infinite;
            margin: 0 auto 12px
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }
    </style>
</head>

// ─── Favorites / Basket ────────────────────────
function toggleFav(btn){
  const id=btn.dataset.favid;
  const idx=favorites.findIndex(f=>f.id===id);
  if(idx>=0){favorites.splice(idx,1);btn.textContent='☆';btn.classList.remove('saved')}
  else{
    favorites.push({
      id,nazwa:btn.dataset.favname,lokalizacja:btn.dataset.favloc,
      dystans:parseInt(btn.dataset.favdist)||0,
      wpis:btn.dataset.favkrdo,typ:btn.dataset.favtype,
      kategoria:btn.dataset.favcat,badges:btn.dataset.favbadges
    });
    btn.textContent='⭐';btn.classList.add('saved');
  }
  localStorage.setItem('krdo_favs',JSON.stringify(favorites));
  renderBasket();
}

function renderBasket(){
  document.getElementById('basketCount').textContent=favorites.length;
  const list=document.getElementById('basketList');
  if(!favorites.length){list.innerHTML='<div class="empty">Kliknij ★ przy placówce, aby ją zapamiętać</div>';return}
  list.innerHTML=favorites.map((f,i)=>`<div class="bitem">
    <div class="bn">${f.nazwa}</div>
    <div class="bm">📍 ${f.lokalizacja} ${f.dystans<99999?`• ~${f.dystans} km`:''} • 📋 ${f.wpis}</div>
    <div class="bm">${f.typ} ${f.badges?'• '+f.badges:''}</div>
    <button class="brm" data-favindex="${i}">🗑️ Usuń</button>
  </div>`).join('');
  list.querySelectorAll('.brm').forEach(btn=>{
    btn.addEventListener('click',function(){
      const i=parseInt(this.dataset.favindex);
      favorites.splice(i,1);
      localStorage.setItem('krdo_favs',JSON.stringify(favorites));
      renderBasket();
      // Re-render to update star states
      render();
    });
  });
}
